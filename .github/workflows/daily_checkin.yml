name: Daily Auto Check-in

on:
  schedule:
    # 每天 UTC 22:00 运行 (即北京时间 6:00)
    - cron: '00 22 * * *'
  workflow_dispatch: # 允许手动点击按钮触发测试
  
jobs:
  checkin:
    runs-on: ubuntu-latest
    
    # 关键：必须增加写权限，否则无法推送代码回仓库
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Run Check-in Script
        env:
          # 从 GitHub Secrets 读取敏感数据
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          # 设置时区，方便日志查看
          TZ: Asia/Shanghai
        run: node checkin.ts
        
        # 👇 新增：自动提交变动以保持仓库活跃
      - name: Keep Alive (Update heartbeat branch)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. 切换到一个独立的分支 heartbeat (如果不存在则创建)
          git checkout -B heartbeat
          
          # 2. 更新心跳文件
          echo "Last check-in: $(date -d '8 hours' +'%Y-%m-%d %H:%M:%S') (CST)" > heartbeat.txt
          
          # 3. 提交并强制推送该分支 (只影响 heartbeat 分支，不影响 main 分支)
          git add heartbeat.txt
          git commit -m "chore: repository active heartbeat" --amend || git commit -m "chore: repository active heartbeat"
          git push origin heartbeat --force